<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Interactive equation solver with plots">
    <title>Equation Solver - Samuel Rumbley</title>
    <link rel="stylesheet" href="../css/styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.plot.ly/plotly-2.32.0.min.js" defer></script>
    <script src="https://cdn.jsdelivr.net/pyodide/v0.24.1/full/pyodide.js" defer></script>
</head>
<body>
    <a href="#main-content" class="skip-link">Skip to main content</a>

    <div id="header"></div>

    <main id="main-content" class="container fade-in">
        <section class="content-box equation-solver">
            <h2 class="center">Equation Solver</h2>
            <p>Enter an equation or inequality and plot its curve alongside the numeric solution set.</p>

            <form id="solver-form" class="solver-form" novalidate>
                <div class="solver-field">
                    <label for="equation-input">Equation or inequality</label>
                    <textarea id="equation-input" name="equation" placeholder="Examples: 2x + 3 = 7, 1 < x < 3, x^2 + 1 = 0" required></textarea>
                </div>

                <div class="solver-row">
                    <div class="solver-field">
                        <label for="xmin-input">x min</label>
                        <input id="xmin-input" name="xmin" type="number" step="0.1" value="-10">
                    </div>
                    <div class="solver-field">
                        <label for="xmax-input">x max</label>
                        <input id="xmax-input" name="xmax" type="number" step="0.1" value="10">
                    </div>
                </div>

                <div class="solver-actions">
                    <button type="submit" class="button">Solve & Plot</button>
                    <span id="solver-status" class="solver-status">Pyodide not loaded yet.</span>
                </div>
            </form>

            <div class="solver-output">
                <div class="result-box">
                    <h3>Result</h3>
                    <pre id="solver-result">Enter an equation to see results.</pre>
                </div>
                <div class="plot-box" id="solver-plot"></div>
            </div>
        </section>
    </main>

    <button id="back-to-top" class="back-to-top" aria-label="Back to top">ƒ+`</button>
    <div id="footer"></div>

    <script src="../js/core/config.js"></script>
    <script src="../js/core/utils.js"></script>
    <script src="../js/core/domUtils.js"></script>
    <script src="../js/core/a11yUtils.js"></script>
    <script src="../js/core/errorHandler.js"></script>
    <script src="../js/core/performance.js"></script>

    <script src="../js/components/header.js"></script>
    <script src="../js/components/footer.js"></script>
    <script src="../js/components/carousel.js"></script>
    <script src="../js/components/collapsible.js"></script>

    <script src="../js/sw-register.js"></script>
    <script src="../js/app.js"></script>
    <script src="../js/equation-solver.js"></script>
</body>
</html>
