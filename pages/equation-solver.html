<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Interactive equation solver and graphing tool by Samuel Rumbley.">
    <title>Equation Solver - Samuel Rumbley</title>
    <link rel="stylesheet" href="../dist/style.css">
    <link rel="stylesheet" href="../css/pages/equation-solver.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>

<body>
    <a href="#main-content" class="skip-link">Skip to main content</a>

    <div id="header"></div>
    <noscript>
        <style>
            .no-js-header {
                position: static;
                height: auto;
                padding: 1rem 0;
                box-shadow: none;
            }

            .no-js-header .header-container-master {
                display: flex;
                flex-direction: column;
                align-items: flex-start;
                gap: 1rem;
                height: auto;
            }

            .no-js-header .menu-toggle-master,
            .no-js-header .close-menu-btn {
                display: none;
            }

            .no-js-header .main-nav {
                position: static;
                width: 100%;
                height: auto;
                display: block;
            }

            .no-js-header .nav-links {
                display: flex;
                flex-wrap: wrap;
                gap: 0.75rem 1rem;
            }
        </style>
        <header class="site-header-master no-js-header" id="top">
            <div class="header-container-master">
                <div class="logo-master">
                    <a href="/">
                        <span class="logo-tag">&lt;</span>
                        <span class="logo-name">S.Rumbley</span>
                        <span class="logo-tag">/&gt;</span>
                    </a>
                </div>
                <nav class="main-nav" aria-label="Primary">
                    <ul class="nav-links">
                        <li><a href="/">Home</a></li>
                        <li><a href="/pages/education.html">Education</a></li>
                        <li><a href="/pages/experience.html">Experience</a></li>
                        <li><a href="/pages/projects.html">Projects</a></li>
                        <li><a href="/pages/scouting.html">Scouting</a></li>
                        <li><a href="/pages/achievements.html">Achievements</a></li>
                        <li><a href="/pages/training.html">Training</a></li>
                    </ul>
                </nav>
            </div>
        </header>
    </noscript>

    <main id="main-content" class="container fade-in">
        <section class="content-box equation-solver">
            <div class="section-header">
                <h1>Equation Solver</h1>
                <p class="section-description">
                    Enter an equation or inequality to solve and visualize it. The solver works best with one variable
                    named <code>x</code>.
                </p>
            </div>

            <form id="solver-form" class="solver-form">
                <div class="solver-field">
                    <label for="equation-input">Equation or inequality</label>
                    <textarea id="equation-input" name="equation" placeholder="Example: x^2 - 4 = 0" required></textarea>
                </div>

                <div class="solver-row">
                    <div class="solver-field">
                        <label for="xmin-input">X min</label>
                        <input id="xmin-input" name="xmin" type="number" value="-10" step="1">
                    </div>
                    <div class="solver-field">
                        <label for="xmax-input">X max</label>
                        <input id="xmax-input" name="xmax" type="number" value="10" step="1">
                    </div>
                    <div class="solver-field solver-actions">
                        <button type="submit" class="primary-btn">Solve</button>
                    </div>
                </div>
            </form>

            <p id="solver-status" class="solver-status" aria-live="polite"></p>

            <div class="solver-output">
                <section class="result-box" aria-labelledby="solver-result-title">
                    <h2 id="solver-result-title">Result</h2>
                    <pre id="solver-result" aria-live="polite">Enter an equation to begin.</pre>
                </section>

                <section class="plot-box" aria-labelledby="solver-plot-title">
                    <h2 id="solver-plot-title">Graph</h2>
                    <div id="solver-plot" role="img" aria-label="Graph of the equation"></div>
                </section>
            </div>
        </section>
    </main>

    <button id="back-to-top" class="back-to-top" aria-label="Back to top">&uarr;</button>
    <div id="footer"></div>

    <script src="../js/app.js"></script>
    <script src="https://cdn.plot.ly/plotly-2.35.2.min.js"></script>
    <script src="https://cdn.jsdelivr.net/pyodide/v0.26.1/full/pyodide.js"></script>
    <script src="../js/equation-solver.js"></script>
</body>

</html>
